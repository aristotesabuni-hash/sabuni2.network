<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> État de Stock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        
        :root {
            --sidebar-bg: #1e2837;      /* Le bleu nuit de ta sidebar */
            --main-bg: #f5f7fb;         /* Gris ultra-clair pour le fond */
            --primary-green: #38b2ac;   /* Le vert Teal du bouton Ajouter */
            --text-dark: #2d3748;       /* Texte principal */
            --text-muted: #718096;      /* Texte secondaire (références) */
            --border-color: #e2e8f0;    /* Bordures légères */
            --card-bg: #ffffff;         /* Fond blanc pur pour le tableau */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Police moderne */
        }

        body {
            display: flex;
            background-color: var(--main-bg);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden; /* Empêche le scroll sur toute la page */
        }

       
        .sidebar {
            width: 260px; 
            background-color: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            flex-shrink: 0;
        }

        .brand-logo {
            font-size: 26px;
            font-weight: 700;
            color: white;
            margin-bottom: 40px;
            padding-left: 10px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            padding: 15px;
            margin-bottom: 8px;
            cursor: pointer;
            border-radius: 10px;
            color: #a0aec0;
            display: flex;
            align-items: center;
            transition: 0.2s;
        }

        .sidebar li i {
            margin-right: 15px;
            width: 20px;
            font-size: 18px;
            text-align: center;
        }

        .sidebar li:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .sidebar li.active {
            background-color: #303f56; /* Bleu légèrement plus clair */
            color: white;
            font-weight: 600;
        }

       
        .main-content {
            flex-grow: 1;
            padding: 40px; /* Grands espacements comme sur la photo */
            overflow-y: auto; /* Scroll uniquement ici */
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .content-header h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

       
        .btn-add {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .btn-add:hover { background-color: #2c8d88; }

        .btn-icon-outline {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        .btn-icon-outline:hover { background-color: #f8fafc; color: var(--text-dark); }

        
           
        .filter-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            align-items: center;
        }

        .search-box {
            position: relative;
            flex-grow: 1; /* Prend tout l'espace */
        }

        .search-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 16px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 15px 15px 50px; /* Espace pour l'icône */
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--card-bg);
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        .search-box input:focus { border-color: var(--primary-green); box-shadow: 0 0 0 3px rgba(56, 178, 172, 0.1); }

        /* Dropdowns filtres */
        .filter-dropdown {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-dark);
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            min-width: 200px;
            appearance: none; /* Cache la flèche par défaut */
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23718096%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.3c0%204.9%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095.2c3.6-3.6%205.4-7.8%205.4-12.9%200-5-1.8-9.3-5.4-12.9z%22%2F%3E%3C%2Fsvg%3E');
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }

        .table-container {
            background-color: var(--card-bg);
            border-radius: 16px; /* Bords très arrondis comme sur la photo */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03); /* Ombre très légère */
            overflow: hidden; /* Pour que les arrondis fonctionnent */
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        /* En-tête du tableau */
        thead tr {
            background-color: #fbfcfd; /* Fond très légèrement grisé */
        }

        th {
            text-align: left;
            padding: 20px 25px;
            font-size: 12px;
            font-weight: 700;
            color: #718096; /* Texte grisé */
            text-transform: uppercase; /* Tout en majuscules */
            letter-spacing: 0.05em; /* Espacement des lettres */
            border-bottom: 1px solid var(--border-color);
        }

        
        tbody td {
            padding: 20px 25px; /* Cellules hautes et aérées */
            border-bottom: 1px solid #f1f5f9; /* Lignes séparatrices très fines */
            font-size: 15px;
            color: var(--text-dark);
            vertical-align: middle; /* Aligne tout au centre verticalement */
        }

        /* Effet au survol d'une ligne */
        tbody tr:hover {
            background-color: #fdfdfd;
        }

        /* Styles spécifiques aux colonnes */
        .col-type i { color: #cbd5e0; font-size: 18px; }

        .col-img { padding-top: 10px; padding-bottom: 10px; }
        .prod-thumb {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border-color);
            background-color: #edf2f7; /* Gris si pas d'image */
            display: flex; align-items: center; justify-content: center; font-size: 10px; color: #a0aec0;
        }

        .col-ref { color: var(--text-muted); font-weight: 500; }
        .col-name { font-weight: 600; color: var(--text-dark); }
        .col-val { font-weight: 500; }
        .col-prix { font-weight: 500; }

        /* Badges de Stock (Swiver Exact) */
        .stock-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 13px;
            display: inline-block;
            min-width: 45px;
            text-align: center;
        }

        .badge-green { background-color: #e6fffa; color: #38b2ac; } /* En stock */
        .badge-orange { background-color: #fffaf0; color: #f6ad55; } /* Critique */
        .badge-red { background-color: #fff5f5; color: #e53e3e; }    /* Rupture */

        /* Icônes d'action */
        .col-actions { text-align: right; }
        .action-icon {
            font-size: 18px;
            cursor: pointer;
            margin-left: 15px;
            transition: 0.2s;
        }

        .edit-icon { color: #63b3ed; } /* Bleu modif */
        .edit-icon:hover { color: #3182ce; }

        .delete-icon { color: #feb2b2; } /* Rouge suppr clair */
        .delete-icon:hover { color: #e53e3e; }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-logo"></div>
        <ul>
            <li><i class="fa fa-th-large"></i> DashBoard</li>
            <li><i class="fa fa-shopping-cart"></i> Achat</li>
            <li class="active"><i class="fa fa-boxes"></i> Stock</li> 
            <li><i class="fa fa-wallet"></i> Caisse</li>
            <li><i class="fa fa-chart-line"></i> Comptabilité</li>
            <li><i class="fa fa-cog"></i> Paramètres</li>
        </ul>
    </div>

    <div class="main-content">
        
        <div class="content-header">
            <h1>"Produits"</h1>
            <div class="header-actions">
                <button class="btn-add"><i class="fa fa-plus"></i> Ajouter</button>
                <button class="btn-icon-outline"><i class="fa fa-print"></i></button>
                <button class="btn-icon-outline"><i class="fa fa-download"></i></button>
            </div>
        </div>

        <div class="filter-bar">
            <div class="search-box">
                <i class="fa fa-search"></i>
                <input type="text" placeholder="Rechercher par référence ou libellé...">
            </div>
            <select class="filter-dropdown">
                <option>Toutes les Catégories</option>
            </select>
            <select class="filter-dropdown">
                <option>Tous les Fournisseurs</option>
            </select>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>TYPE</th>
                        <th>IMAGE</th>
                        <th>RÉFÉRENCE</th>
                        <th>LIBELLÉ / MODÈLE</th>
                        <th>VALEUR EN STOCK</th>
                        <th>PRIX VENTE</th>
                        <th>STOCK</th>
                        <th>ACTIONS</th>
                    
                        <td class="col-type"><i class="fa fa-tag"></i></td>
                        <td class="col-img">
                            <div class="prod-thumb">Cable</div>
                       
                    </tr>
                </tbody>
            </table>
        </div>

    </div> </body>
</html>
