<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> </head>
    <title>Document</title>
    <style>
        /* Style général du tableau de stock */
.container-stock {
    padding: 20px;
    background-color: #f4f7f6;
}

.table-stock {
    width: 100%;
    border-collapse: collapse;
    background-color: white;
    border-radius: 8px;
    overflow: hidden; /* Pour arrondir les coins du tableau */
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
}

.table-stock thead {
    background-color: #2c3e50; /* Couleur sombre comme ton menu latéral */
    color: white;
    text-align: left;
}

.table-stock th, .table-stock td {
    padding: 15px 20px;
    border-bottom: 1px solid #eee;
}

.table-stock tbody tr:hover {
    background-color: #f1f1f1; /* Effet de survol */
}

/* Badges pour l'état du stock */
.badge {
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 0.85em;
    font-weight: bold;
}

.stock-ok {
    background-color: #d4edda;
    color: #155724;
}

.stock-bas {
    background-color: #f8d7da;
    color: #721c24;
}

/* Boutons d'action rapides */
.btn-action {
    padding: 6px 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

.btn-achat { background-color: #27ae60; color: white; }
.btn-vente { background-color: #e67e22; color: white; }



    </style>

</head>
<body>
    <div class="container-stock">
    <h2>Gestion des Stocks</h2>
    <table class="table-stock">
        <thead>
            <tr>
                <th>Produit</th>
                <th>Quantité</th>
                <th>Statut</th>
                <th>Actions Rapides</th>
            </tr>
        </thead>
        <tbody id="corps-tableau-stock">
            </tbody>
    </table>
</div>
 <script src="stock.js"></script>
   
</body>
</html>
