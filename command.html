<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="style.css">
    <title>Document</title>
    <style>
        /* Couleur spécifique pour l'onglet commande */
#dateEcheance {
    border: 2px solid #f39c12 !important;
    color: #e67e22 !important;
    text-align: center;
}

.btn-add[style*="#f39c12"]:hover {
    background-color: #d35400 !important;
}

/* Style pour l'entête commande client */
.invoice-header-fields {
    border-left: 5px solid #f39c12;
}


    </style>
</head>
<body>
   <div class="purchase-page-container">
    <h3 style="text-align: center; margin-bottom: 25px; font-weight: 600;">Prise de Commande Client</h3>
    
    <div class="invoice-header" style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 20px;">
        <div class="form-group" style="flex: 2;">
            <label>Nom du Client</label>
            <input type="text" id="nomClientCmd" placeholder="Ex: client">
        </div>
        <div class="form-group" style="flex: 1;">
            <label>Date Commande</label>
            <input type="date" id="dateCmd" onchange="majEcheance()">
        </div>
        <div class="form-group" style="flex: 1;">
            <label>Échéance (+10 jours)</label>
            <input type="text" id="dateEcheance" readonly style="background: #e9ecef; font-weight: bold; color: #2c3e50;">
        </div>
    </div>

    <div class="purchase-form" style="display: flex; gap: 15px; align-items: flex-end; margin-bottom: 20px;">
        <div class="form-group" style="flex: 1;">
            <label>Marque</label>
            <input type="text" id="marqueCmd" placeholder="Marque">
        </div>
        <div class="form-group" style="flex: 2;">
            <label>Désignation</label>
            <input type="text" id="prodCmd" placeholder="Produit">
        </div>
        <div class="form-group" style="flex: 0.5;">
            <label>Qté</label>
            <input type="number" id="qteCmd" value="0">
        </div>
        <div class="form-group" style="flex: 1;">
            <label>P.U. ($)</label>
            <input type="number" id="prixCmd" placeholder="0.00" step="0.01">
        </div>
    </div>

    <div style="text-align: center; margin-bottom: 30px;">
        <button type="button" onclick="ajouterLigneCommande()" style="background-color: #2c3e50; color: white; padding: 10px 50px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold;">
            Ajouter
        </button>
    </div>

    <table class="purchase-table" style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
        <thead>
            <tr style="border-bottom: 2px solid #eee; text-align: left;">
                <th style="padding: 12px;">MARQUE</th>
                <th style="padding: 12px;">DÉSIGNATION</th>
                <th style="padding: 12px;">QTÉ</th>
                <th style="padding: 12px;">P.U.</th>
                <th style="padding: 12px;">TOTAL</th>
                <th style="padding: 12px;">ACTION</th>
            </tr>
        </thead>
        <tbody id="tbodyCommande">
            </tbody>
    </table>

    <div style="display: flex; justify-content: flex-end; margin-top: 20px;">
        <div style="text-align: right; width: 250px;">
            <h3 id="totalCommandeDisplay" style="margin-bottom: 15px;">Total Général : 0.00 $</h3>
            
            <button class="btn-sidebar" style="background: #95a5a6; color: white; width: 100%; padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; cursor: pointer;" onclick="window.print()">
                🖨️ Imprimer la Facture
            </button>
            <button class="btn-sidebar" style="background: white; border: 1px solid #2c3e50; color: #2c3e50; width: 100%; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold;" onclick="validerCommande()">
                💾 Enregistrer
            </button>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
