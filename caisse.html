<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="style.css">

    <title>Document</title>
    <style>
        /* Couleurs pour les flux financiers */
.txt-entree {
    color: #27ae60;
    font-weight: bold;
}

.txt-sortie {
    color: #e74c3c;
    font-weight: bold;
}

/* On réutilise tes styles de base pour la cohérence */
.purchase-page-container {
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.1);
    max-width: 1100px;
    margin: 30px auto;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 600;
    color: #666;
}

.purchase-table th {
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
}

    </style>
</head>
<body>
    <div class="purchase-page-container">
    <h3 style="text-align: center; margin-bottom: 20px;">Mouvements de Caisse Détaillés</h3>

    <div style="display: flex; justify-content: center; margin-bottom: 30px;">
        <div style="background: #2c3e50; color: white; padding: 15px 40px; border-radius: 10px; text-align: center;">
            <small>SOLDE TOTAL EN CAISSE</small>
            <h1 id="soldeCaisseDisplay" style="margin: 5px 0 0 0;">0.00 $</h1>
        </div>
    </div>

    <div class="invoice-header" style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
        <div class="purchase-form" style="display: flex; gap: 10px; align-items: flex-end;">
            <div class="form-group" style="flex: 2;">
                <label>Article / Prestation</label>
                <input type="text" id="articleCaisse" placeholder="Désignation de l'article">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Flux</label>
                <select id="fluxCaisse" style="padding: 10px; border-radius: 5px; border: 1px solid #ddd; width: 100%;">
                    <option value="ENTREE">Vente (Entrée +)</option>
                    <option value="SORTIE">Achat (Sortie -)</option>
                </select>
            </div>
            <div class="form-group" style="flex: 0.5;">
                <label>Qté</label>
                <input type="number" id="qteCaisse" value="1">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>P.U. ($)</label>
                <input type="number" id="puCaisse" placeholder="0.00">
            </div>
            <button type="button" onclick="enregistrerOperation()" class="btn-add" style="background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">
                Enregistrer
            </button>
        </div>
    </div>

    <table class="purchase-table" style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="background: #eee; text-align: left;">
                <th style="padding: 12px;">DATE</th>
                <th style="padding: 12px;">ARTICLE</th>
                <th style="padding: 12px;">TYPE</th>
                <th style="padding: 12px;">MONTANT ($)</th>
                <th style="padding: 12px;">SOLDE PROGRESSIF</th>
                <th style="padding: 12px;">ACTION</th>
            </tr>
        </thead>
        <tbody id="tbodyCaisse">
            </tbody>
    </table>
</div>
<script src="script.js"></script>
    
</body>
</html>
