    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; background-color: #f3f7fd; }

        /* --- Barre du Haut (TopBar) --- */
        .top-bar {
            background-color: white;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 65px;
            border-bottom: 1px solid #e0e6ed;
        }
        .brand h2 { color: #333; font-size: 20px; }
        .top-icons { display: flex; gap: 20px; color: #556080; cursor: pointer; }

        /* --- Conteneur Principal --- */
        .app-container { display: flex; flex: 1; overflow: hidden; }

        /* --- Barre Latérale (Sidebar) --- */
        .sidebar {
            width: 250px;
            background-color: #1a2536; /* Bleu sombre de ta capture */
            color: #d1d5db;
            display: flex;
            flex-direction: column;
        }
        .nav-links { list-style: none; margin-top: 10px; }
        .nav-links li a {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            color: #d1d5db;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }
        .nav-links li a:hover { background-color: #111827; color: white; }
        .nav-links li a i { margin-right: 15px; width: 20px; text-align: center; font-size: 18px; }

        /* --- Zone de Contenu --- */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
    </style>
</head>
